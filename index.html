<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Scorer & ATS Checker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1A1A18;
    --text-muted: #6B6B63;
    --text-faint: #9B9B93;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --red: #791F1F;
    --red-bg: #FCEBEB;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --accent: #1A1A18;
    --radius: 10px;
    --radius-lg: 14px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --surface: #1E1E1B;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.18);
      --text: #EEEEE8;
      --text-muted: #9B9B8F;
      --text-faint: #6B6B63;
      --green: #C0DD97;
      --green-bg: #173404;
      --amber: #FAC775;
      --amber-bg: #412402;
      --red: #F7C1C1;
      --red-bg: #501313;
      --blue: #85B7EB;
      --blue-bg: #042C53;
      --accent: #EEEEE8;
    }
  }

  html { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; }

  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem 4rem; }

  .site-header { width: 100%; max-width: 580px; margin-bottom: 2.5rem; }
  .site-header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 4px; }
  .site-header p { font-size: 13px; color: var(--text-muted); }

  .container { width: 100%; max-width: 580px; }

  .page { display: none; }
  .page.active { display: block; }

  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }

  select, textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    background: var(--surface); color: var(--text);
    line-height: 1.5; transition: border-color .15s;
  }
  select { cursor: pointer; }
  textarea { resize: vertical; }
  select:focus, textarea:focus { outline: none; border-color: var(--border-strong); }

  .word-hint { display: flex; align-items: center; gap: 6px; margin-top: 5px; min-height: 18px; }
  .wdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .wdot.ok { background: #639922; }
  .wdot.warn { background: #EF9F27; }
  .wdot.err { background: #E24B4A; }
  .word-hint span { font-size: 12px; color: var(--text-muted); }

  .btn-primary {
    width: 100%; padding: 12px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: opacity .15s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: .82; }
  .btn-primary:disabled { opacity: .35; cursor: not-allowed; }

  .btn-secondary {
    width: 100%; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    color: var(--text-muted); cursor: pointer; transition: background .15s;
  }
  .btn-secondary:hover { background: var(--bg); }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }

  .err-box {
    display: none;
    background: var(--red-bg); border: 1px solid rgba(162,45,45,.25);
    border-radius: var(--radius); padding: 10px 14px;
    font-size: 13px; color: var(--red); margin-top: 10px;
  }

  .loading-wrap { text-align: center; padding: 5rem 1rem; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap .lmsg { font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .loading-wrap .lsub { font-size: 12px; color: var(--text-faint); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .875rem;
  }
  .card-title {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px;
  }

  .score-hero { display: flex; align-items: center; gap: 1.25rem; }
  .ring-wrap { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring-wrap svg { width: 88px; height: 88px; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .rscore { font-size: 26px; font-weight: 500; line-height: 1; font-family: 'DM Mono', monospace; }
  .rlabel { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .hero-text h3 { font-size: 16px; font-weight: 500; margin-bottom: 5px; letter-spacing: -.01em; }
  .hero-text p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  .bench-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
  .bench-you-lbl { font-size: 12px; color: var(--text-muted); }
  .bench-you-lbl strong { color: var(--text); font-weight: 500; }
  .bench-track { position: relative; height: 8px; background: var(--bg); border-radius: 4px; overflow: visible; margin-bottom: 7px; border: 1px solid var(--border); }
  .bench-fill { height: 100%; border-radius: 4px; position: absolute; left: 0; top: 0; transition: width 1s ease; }
  .bench-avg-line { position: absolute; top: -4px; bottom: -4px; width: 2px; border-radius: 1px; background: var(--border-strong); }
  .bench-avg-tip { position: absolute; top: -22px; font-size: 10px; color: var(--text-faint); font-family: 'DM Mono', monospace; transform: translateX(-50%); white-space: nowrap; }
  .bench-zones { display: flex; justify-content: space-between; }
  .bench-zone { font-size: 10px; color: var(--text-faint); }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: .875rem; }
  .metric { background: var(--bg); border-radius: var(--radius); padding: 12px 10px; border: 1px solid var(--border); }
  .metric-val { font-size: 20px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .metric-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .bar-row { display: grid; grid-template-columns: 120px 1fr 32px; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-name { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width .9s ease; }
  .bar-pct { font-size: 12px; font-weight: 500; text-align: right; font-family: 'DM Mono', monospace; }

  .chips-label { font-size: 12px; color: var(--text-muted); margin-top: 10px; }
  .chips-label:first-child { margin-top: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
  .chip { padding: 3px 9px; border-radius: 20px; font-size: 12px; }
  .chip-g { background: var(--green-bg); color: var(--green); }
  .chip-r { background: var(--red-bg); color: var(--red); }

  .issue-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .issue-row:last-child { border-bottom: none; }
  .sev-badge { flex-shrink: 0; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 500; margin-top: 2px; }
  .sev-h { background: var(--red-bg); color: var(--red); }
  .sev-m { background: var(--amber-bg); color: var(--amber); }
  .sev-l { background: var(--green-bg); color: var(--green); }
  .issue-text { font-size: 13px; line-height: 1.5; }
  .issue-fix { font-size: 12px; color: var(--text-muted); margin-top: 4px; padding-left: 10px; border-left: 2px solid var(--border); line-height: 1.5; border-radius: 0; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: .875rem; }
  .tip-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
  .tip-card h4 { font-size: 12px; font-weight: 500; margin-bottom: 7px; }
  .tip-card ul { padding-left: 14px; }
  .tip-card li { font-size: 12px; color: var(--text-muted); line-height: 1.7; }

  .empty-note { font-size: 13px; color: var(--text-muted); }

  @media (max-width: 480px) {
    .two-col { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .bar-row { grid-template-columns: 90px 1fr 28px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Resume scorer & ATS checker</h1>
  <p>Paste your resume and get an instant match score against any job role</p>
</header>

<main class="container">

  <div class="page active" id="page-input">
    <div class="field">
      <label for="role-sel">Target role</label>
      <select id="role-sel" onchange="onRoleChange()">
        <option value="pm">Product Manager</option>
        <option value="da">Data Analyst</option>
        <option value="swe">Software Engineer</option>
        <option value="ba">Business Analyst</option>
        <option value="mkt">Marketing Manager</option>
        <option value="custom">Custom role</option>
      </select>
    </div>

    <div class="field">
      <label for="jd-input">Job description</label>
      <textarea id="jd-input" rows="4" style="min-height:100px" oninput="wordHint('jd-input','jd-hint',30,500)"></textarea>
      <div class="word-hint" id="jd-hint"></div>
    </div>

    <div class="field">
      <label for="resume-input">Your resume</label>
      <textarea id="resume-input" rows="9" style="min-height:150px" placeholder="Paste plain text — education, experience, skills, projects..." oninput="wordHint('resume-input','rv-hint',80,1200)"></textarea>
      <div class="word-hint" id="rv-hint"></div>
    </div>

    <button class="btn-primary" id="analyze-btn" onclick="analyze()">Analyze resume</button>
    <div class="err-box" id="err-box"></div>
  </div>

  <div class="page" id="page-loading">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p class="lmsg" id="loading-msg">Scanning keywords...</p>
      <p class="lsub" id="loading-sub">This takes just a moment</p>
    </div>
  </div>

  <div class="page" id="page-results">
    <div id="results-content"></div>
  </div>

</main>

<script>
const ROLES = {
  pm: {
    label: 'Product Manager',
    keywords: ['roadmap','product manager','product management','user stories','prd','agile','scrum','backlog','jira','stakeholder','a/b test','experimentation','mixpanel','amplitude','google analytics','sql','user research','competitive analysis','okr','kpi','product strategy','figma','cross-functional','prioritization','go-to-market','product owner','data-driven','sprint','customer discovery','wireframe'],
    market: 'PM roles remain competitive in 2025–26. Companies expect data-driven decision-making, evidence of shipped features, and increasingly — AI product experience. Portfolios and case studies matter as much as job titles.',
    tips: ['Add product case studies with measurable outcomes', 'Quantify impact: users, revenue, retention metrics', 'List tools explicitly: Jira, Figma, Amplitude, SQL', 'Include examples of cross-functional leadership']
  },
  da: {
    label: 'Data Analyst',
    keywords: ['sql','python','r','tableau','power bi','looker','excel','google sheets','etl','bigquery','redshift','snowflake','pandas','statistics','hypothesis testing','regression','dashboard','data pipeline','data cleaning','analytics','a/b testing','cohort analysis','funnel analysis','kpi','visualization','reporting','numpy','matplotlib','data wrangling','insight'],
    market: 'Data analyst demand is strong in India and globally. SQL + Python + one BI tool is the baseline. Cloud warehouse skills (BigQuery, Snowflake) increasingly expected even for freshers. Kaggle and GitHub portfolios carry real weight.',
    tips: ['List every tool: SQL, Python, Tableau, Power BI', 'Add a GitHub or Kaggle portfolio link', 'Quantify scale: "analyzed 2M+ rows", "cut report time 40%"', 'Add Google Data Analytics or IBM certifications']
  },
  swe: {
    label: 'Software Engineer',
    keywords: ['javascript','typescript','react','node.js','python','java','go','rest api','graphql','postgresql','mongodb','git','docker','kubernetes','aws','gcp','azure','ci/cd','microservices','system design','agile','unit testing','html','css','backend','frontend','full stack','algorithms','data structures','oop','design patterns','redis'],
    market: 'SWE hiring has stabilised after the 2023–24 correction. Full-stack and backend with cloud experience are most sought. LLM integration and AI feature work is a strong differentiator. GitHub activity is frequently checked by recruiters.',
    tips: ['Add your GitHub URL prominently', 'List languages and frameworks explicitly', 'Include system design or architecture examples', 'Mention any LLM/AI integration experience']
  },
  ba: {
    label: 'Business Analyst',
    keywords: ['requirements','brd','frd','user stories','use cases','process mapping','gap analysis','stakeholder','jira','confluence','sql','excel','agile','scrum','uat','documentation','wireframe','workflow','data analysis','reporting','bpmn','visio','power bi','tableau','erp','crm','business analyst','sprint','functional','non-functional'],
    market: 'BA roles in India are growing steadily in BFSI, IT services, and consulting. SQL, agile certifications, and documented BRD experience set freshers apart. Domain knowledge in banking or e-commerce adds clear value.',
    tips: ['Mention domains: BFSI, e-commerce, healthcare', 'Add CBAP or PMI-PBA certifications', 'Include examples of requirements docs you authored', 'Quantify process improvements you identified']
  },
  mkt: {
    label: 'Marketing Manager',
    keywords: ['digital marketing','seo','sem','ppc','google ads','facebook ads','social media','content strategy','email marketing','hubspot','salesforce','crm','campaign management','roi','google analytics','conversion rate','lead generation','brand management','copywriting','content marketing','marketing automation','a/b testing','growth','influencer','budget management','market research','acquisition','retention','funnel','performance marketing'],
    market: 'Marketing in 2025–26 is digital-first. AI-assisted content, performance marketing with measurable ROI, and data analytics are non-negotiable. Google and HubSpot certifications are widely expected even at mid-level.',
    tips: ['Quantify campaigns: impressions, CTR, conversions, ROAS', 'Add Google Ads, HubSpot, or Meta certifications', 'Name the ad platforms and budgets you managed', 'Include campaign examples with outcomes']
  },
  custom: {
    label: 'Custom Role',
    keywords: [],
    market: 'Tailor your resume to mirror the exact language in the job description. ATS systems score on literal keyword overlap, so matching phrasing matters more than paraphrasing.',
    tips: ['Copy exact phrases from the JD into your resume', 'Quantify every achievement with numbers', 'Keep formatting simple — no tables or columns', 'Write a tailored summary targeting this specific role']
  }
};

const JD_DEFAULTS = {
  pm: `Product Manager – Mid Level\n\nOwn the product roadmap, partner with engineering and design, and drive data-informed decisions.\n\nResponsibilities: Define product vision and strategy, write PRDs and user stories, collaborate with engineering and design, use Mixpanel/Amplitude/GA4, conduct user research and competitive analysis, manage backlog in Jira, run A/B tests, present to leadership.\n\nRequirements: 2–5 years PM experience, agile/scrum, SQL familiarity, stakeholder management, roadmapping tools, MBA or technical degree preferred.`,
  da: `Data Analyst – Entry to Mid Level\n\nTransform complex data into clear business insights.\n\nRequirements: Advanced SQL, Python or R, BI tools (Tableau, Power BI, Looker), Excel and Google Sheets, statistical analysis and hypothesis testing, ETL pipelines, cloud warehouses (BigQuery, Redshift, Snowflake).`,
  swe: `Software Engineer – Full Stack\n\nBuild scalable web products in a product engineering team.\n\nRequirements: JavaScript/TypeScript, React, Node.js, backend in Python/Java/Go, REST and GraphQL APIs, PostgreSQL/MongoDB, Git and CI/CD, AWS/GCP/Azure, system design fundamentals, agile/scrum.`,
  ba: `Business Analyst – Fresher to Mid Level\n\nBridge business and technology.\n\nRequirements: Requirements gathering and BRD documentation, process mapping and gap analysis, stakeholder management, SQL and Excel, JIRA and Confluence, agile/scrum experience, strong presentation and communication skills.`,
  mkt: `Marketing Manager\n\nLead campaigns and drive customer acquisition.\n\nRequirements: 3–5 years digital marketing experience, SEO, SEM, paid social, campaign analytics and ROI reporting, HubSpot or Salesforce CRM, content strategy and copywriting, budget planning and management.`,
  custom: ''
};

const STOPWORDS = new Set(['with','that','this','have','from','they','will','your','more','been','were','when','what','which','their','there','about','would','these','other','into','than','then','some','also','each','just','over','such','only','even','most','well','very','much','both','here','need','must','should','good','make','take','work','team','role','year','years','best','help','new','our','the','and','for','are','but','not','you','all','can','was','one','its','two','may','has','had','how','did','let','put','say','see','set','use','able','after','being','every','first','found','given','going','great','high','however','include','including','large','last','like','long','look','made','many','might','next','often','part','people','place','point','same','show','since','small','still','time','under','used','using','want','where','while','within','without']);

let lastResume = '', lastJD = '', lastRole = '';

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearErr() {
  document.getElementById('err-box').style.display = 'none';
}

function wordCount(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function wordHint(inputId, hintId, min, max) {
  const text = document.getElementById(inputId).value.trim();
  const el = document.getElementById(hintId);
  if (!text) { el.innerHTML = ''; return; }
  const wc = wordCount(text);
  let dot, msg;
  if (wc < min) { dot = 'err'; msg = `${wc} words — too short`; }
  else if (wc > max) { dot = 'warn'; msg = `${wc} words — consider trimming`; }
  else if (wc < min * 1.5) { dot = 'warn'; msg = `${wc} words — a bit short`; }
  else { dot = 'ok'; msg = `${wc} words — good length`; }
  el.innerHTML = `<span class="wdot ${dot}"></span><span>${msg}</span>`;
}

function onRoleChange() {
  const role = document.getElementById('role-sel').value;
  const el = document.getElementById('jd-input');
  const isCustom = role === 'custom';
  el.value = JD_DEFAULTS[role] || '';
  el.readOnly = !isCustom;
  el.style.opacity = isCustom ? '1' : '0.6';
  el.placeholder = isCustom ? 'Paste the full job description here...' : '';
  wordHint('jd-input', 'jd-hint', 30, 500);
}
onRoleChange();

const LOADING_MSGS = [
  ['Scanning for keywords...', 'Checking keyword density against the JD'],
  ['Scoring your experience section...', 'Looking for action verbs and impact metrics'],
  ['Checking ATS compatibility...', 'Detecting format and structure issues'],
  ['Measuring role fit...', 'Comparing your profile to job requirements'],
  ['Building your report...', 'Almost done']
];

function clr(s) { return s >= 75 ? '#639922' : s >= 50 ? '#EF9F27' : '#E24B4A'; }

function extractJDKeywords(jd) {
  return [...new Set(jd.toLowerCase().split(/[\s,.\-–—()/:\n]+/).filter(w => w.length > 3 && !STOPWORDS.has(w) && /^[a-z]/.test(w)))];
}

function scoreKeywords(resumeLow, jd, roleKws) {
  const jdKws = extractJDKeywords(jd);
  const allKws = [...new Set([...roleKws, ...jdKws])];
  const found = [], missing = [];
  allKws.slice(0, 45).forEach(kw => { (resumeLow.includes(kw) ? found : missing).push(kw); });
  const pct = allKws.length > 0 ? Math.round(found.length / allKws.length * 100) : 0;
  return { score: pct, found: found.slice(0, 10), missing: missing.slice(0, 8) };
}

function scoreExperience(resumeLow) {
  let s = 35;
  const verbs = ['managed','led','developed','built','created','designed','implemented','analysed','analyzed','coordinated','delivered','achieved','launched','shipped','improved','reduced','increased','grew','established','executed','streamlined','supported'];
  s += Math.min(25, verbs.filter(v => resumeLow.includes(v)).length * 3);
  if (/\d+\s*%/.test(resumeLow)) s += 12;
  if (/(increased|decreased|reduced|improved|grew|launched|shipped|delivered|exceeded)/.test(resumeLow)) s += 13;
  if (/(20\d{2})\s*[-–—]\s*(20\d{2}|present|current)/i.test(resumeLow)) s += 10;
  if (/\d+/.test(resumeLow)) s += 5;
  return Math.min(100, s);
}

function scoreEducation(resumeLow) {
  let s = 45;
  if (/(b\.?tech|b\.?e\.|bachelor|engineering|b\.?sc|b\.?com|bba)/.test(resumeLow)) s += 15;
  if (/(mba|master|m\.?tech|pgdm|post.?graduate|m\.?sc)/.test(resumeLow)) s += 20;
  if (/(iit|iim|bits|nit|vit|srm|manipal|university|institute|college)/.test(resumeLow)) s += 10;
  if (/([89]\d|10)[.\s]*[\/\\%]|cgpa[\s:]*[89]|gpa[\s:]*[34]\.[5-9]/.test(resumeLow)) s += 10;
  return Math.min(100, s);
}

function detectIssues(resume, resumeLow, kwResult) {
  const issues = [];
  if (kwResult.missing.length > 4) issues.push({ sev: 'high', text: `${kwResult.missing.length} important keywords absent`, fix: 'Add these to your skills or experience section: ' + kwResult.missing.slice(0, 4).join(', ') });
  if (!/\d+\s*%|\d+x|₹\d+|\$\d+|\d+\s*(users|customers|revenue|growth|reduction|increase|projects|team)/i.test(resume)) issues.push({ sev: 'high', text: 'No quantified achievements found', fix: 'Add numbers: "increased sales 30%", "led team of 5", "reduced load time by 2s"' });
  if (resume.trim().length < 200) issues.push({ sev: 'high', text: 'Resume is too short for effective ATS parsing', fix: 'Expand to at least 400 words covering experience, skills, education, and projects' });
  if (!/(linkedin\.com|github\.com|portfolio|behance|dribbble)/.test(resumeLow)) issues.push({ sev: 'med', text: 'No professional profile URL detected', fix: 'Add your LinkedIn and GitHub/portfolio URLs near your name at the top' });
  if (!/(skills|technologies|tools|tech stack|proficiencies|expertise)/i.test(resume)) issues.push({ sev: 'med', text: 'No dedicated skills section detected', fix: 'Add a "Skills" or "Technical Skills" section listing tools and technologies' });
  if (!/(19|20)\d{2}/.test(resume)) issues.push({ sev: 'med', text: 'No dates found in your resume', fix: 'Add start and end dates (Month Year) for all roles and education entries' });
  if (!/(b\.?tech|bba|b\.?sc|bachelor|master|mba|degree|university|college|institute)/i.test(resume)) issues.push({ sev: 'low', text: 'Education section may be missing or unclear', fix: 'Add your degree, institution, graduation year, and GPA if strong' });
  if (resume.trim().length > 9000) issues.push({ sev: 'low', text: 'Resume may be too long', fix: 'Trim to 1–2 pages. Remove outdated roles and keep bullets to 1–2 lines' });
  return issues;
}

function verdict(score) {
  if (score >= 85) return { v: 'Excellent match', d: 'Your resume aligns strongly with this role. Small keyword additions could push it even further.' };
  if (score >= 70) return { v: 'Strong match', d: 'Good alignment overall. Fixing the missing keywords and flagged issues will meaningfully improve your chances.' };
  if (score >= 55) return { v: 'Good match', d: 'A reasonable fit, but notable gaps exist. Targeted edits to keywords and achievements will help considerably.' };
  if (score >= 40) return { v: 'Moderate match', d: 'Noticeable gaps between your resume and the job requirements. A focused rewrite is recommended before applying.' };
  return { v: 'Weak match', d: 'Significant mismatch detected. Consider a thorough revision tailored specifically to this role and JD.' };
}

function analyze() {
  clearErr();
  const resume = document.getElementById('resume-input').value.trim();
  const jd = document.getElementById('jd-input').value.trim();
  const role = document.getElementById('role-sel').value;
  if (!resume) { showErr('Please paste your resume text before analyzing.'); return; }
  if (resume.length < 60) { showErr('Your resume looks too short. Paste the full text including experience, education, and skills.'); return; }
  if (!jd || jd.length < 30) { showErr('The job description is empty. Select a preset role or paste a custom JD.'); return; }
  lastResume = resume; lastJD = jd; lastRole = role;
  runScoring(resume, jd, role);
}

function runScoring(resume, jd, role) {
  document.getElementById('analyze-btn').disabled = true;
  showPage('page-loading');
  let mi = 0;
  const tick = setInterval(() => {
    if (mi < LOADING_MSGS.length) {
      document.getElementById('loading-msg').textContent = LOADING_MSGS[mi][0];
      document.getElementById('loading-sub').textContent = LOADING_MSGS[mi][1];
      mi++;
    }
  }, 520);
  setTimeout(() => {
    clearInterval(tick);
    try {
      const rd = ROLES[role] || ROLES.pm;
      const resumeLow = resume.toLowerCase();
      const kw = scoreKeywords(resumeLow, jd, rd.keywords);
      const exp = scoreExperience(resumeLow);
      const edu = scoreEducation(resumeLow);
      const fmt = Math.round((kw.score * 0.4) + (exp * 0.4) + (edu * 0.2));
      const ats = Math.round((kw.score * 0.5) + (fmt * 0.3) + (exp * 0.2));
      const overall = Math.round((kw.score * 0.35) + (exp * 0.30) + (edu * 0.15) + (fmt * 0.20));
      const issues = detectIssues(resume, resumeLow, kw);
      const vd = verdict(overall);
      drawResults({ overall, ats, kw, exp, edu, issues, vd, rd });
    } catch (e) {
      showPage('page-input');
      showErr('Something went wrong while analyzing. Please check your input and try again.');
    } finally {
      document.getElementById('analyze-btn').disabled = false;
    }
  }, 2600);
}

function drawResults({ overall, ats, kw, exp, edu, issues, vd, rd }) {
  const C = 2 * Math.PI * 36, d = (overall / 100) * C, c = clr(overall);
  const avgScore = 58;
  const cats = [
    { n: 'Skills match', s: kw.score },
    { n: 'Experience', s: exp },
    { n: 'Education', s: edu },
    { n: 'Keyword density', s: Math.min(100, Math.round(kw.score * 1.05)) },
    { n: 'Achievements', s: Math.min(100, exp + 5) },
    { n: 'Format & clarity', s: Math.min(100, Math.round((kw.score + exp) / 2)) }
  ];
  const sevLabel = { high: 'High', med: 'Medium', low: 'Low' };
  const sevClass = { high: 'sev-h', med: 'sev-m', low: 'sev-l' };
  const youLabel = overall > avgScore ? `${overall - avgScore} pts above average` : `${avgScore - overall} pts below average`;

  const html = `
<div class="card">
  <div class="score-hero">
    <div class="ring-wrap">
      <svg viewBox="0 0 88 88">
        <circle cx="44" cy="44" r="36" fill="none" stroke="var(--bg)" stroke-width="7"/>
        <circle cx="44" cy="44" r="36" fill="none" stroke="${c}" stroke-width="7"
          stroke-dasharray="${d.toFixed(1)} ${C.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 44 44)"/>
      </svg>
      <div class="ring-center">
        <span class="rscore" style="color:${c}">${overall}</span>
        <span class="rlabel">/100</span>
      </div>
    </div>
    <div class="hero-text">
      <h3>${vd.v}</h3>
      <p>${vd.d}</p>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">Your score vs. average applicant</div>
  <div class="bench-label-row">
    <span class="bench-you-lbl">Score: <strong style="color:${c}">${overall}</strong></span>
    <span class="bench-you-lbl">${youLabel}</span>
  </div>
  <div class="bench-track">
    <div class="bench-fill" style="width:${Math.min(98, overall)}%;background:${c}"></div>
    <div class="bench-avg-line" style="left:${avgScore}%">
      <span class="bench-avg-tip">avg ${avgScore}</span>
    </div>
  </div>
  <div class="bench-zones">
    <span class="bench-zone">Weak</span>
    <span class="bench-zone">Moderate</span>
    <span class="bench-zone">Good</span>
    <span class="bench-zone">Strong</span>
    <span class="bench-zone">Excellent</span>
  </div>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-val" style="color:${clr(ats)}">${ats}%</div><div class="metric-lbl">ATS pass rate</div></div>
  <div class="metric"><div class="metric-val" style="color:${clr(kw.score)}">${kw.score}%</div><div class="metric-lbl">Keyword match</div></div>
  <div class="metric"><div class="metric-val" style="color:${clr(exp)}">${exp}%</div><div class="metric-lbl">Experience score</div></div>
</div>

<div class="card">
  <div class="card-title">Category breakdown</div>
  ${cats.map(ct => `<div class="bar-row">
    <div class="bar-name">${ct.n}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${ct.s}%;background:${clr(ct.s)}"></div></div>
    <div class="bar-pct" style="color:${clr(ct.s)}">${ct.s}</div>
  </div>`).join('')}
</div>

<div class="card">
  <div class="card-title">Keyword analysis</div>
  <p class="chips-label">Found in your resume (${kw.found.length})</p>
  <div class="chips">${kw.found.length ? kw.found.map(k => `<span class="chip chip-g">${k}</span>`).join('') : '<span class="empty-note">No matching keywords detected — tailor your resume more closely to the JD</span>'}</div>
  <p class="chips-label">Missing — add these to boost your ATS score (${kw.missing.length})</p>
  <div class="chips">${kw.missing.length ? kw.missing.map(k => `<span class="chip chip-r">${k}</span>`).join('') : '<span class="empty-note">All key terms are present</span>'}</div>
</div>

<div class="card">
  <div class="card-title">Issues to fix</div>
  ${issues.length ? issues.slice(0, 5).map(i => `<div class="issue-row">
    <span class="sev-badge ${sevClass[i.sev]}">${sevLabel[i.sev]}</span>
    <div>
      <div class="issue-text">${i.text}</div>
      <div class="issue-fix">How to fix: ${i.fix}</div>
    </div>
  </div>`).join('') : '<span class="empty-note">No critical issues detected — great work.</span>'}
</div>

<div class="two-col">
  <div class="tip-card">
    <h4>Quick wins for this role</h4>
    <ul>${rd.tips.map(t => `<li>${t}</li>`).join('')}</ul>
  </div>
  <div class="tip-card">
    <h4>ATS general tips</h4>
    <ul>
      <li>Mirror exact phrases from the JD</li>
      <li>One column layout, no tables or text boxes</li>
      <li>Save as .docx or plain PDF</li>
      <li>1 page for freshers, 2 max for experienced</li>
    </ul>
  </div>
</div>

<div class="card">
  <div class="card-title">Job market — ${rd.label}</div>
  <p style="font-size:13px;color:var(--text-muted);line-height:1.6">${rd.market}</p>
</div>

<div class="btn-row">
  <button class="btn-primary" onclick="editAndReanalyze()">Edit & re-analyze</button>
  <button class="btn-secondary" onclick="resetAll()">Start fresh</button>
</div>`;

  document.getElementById('results-content').innerHTML = html;
  showPage('page-results');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function editAndReanalyze() {
  document.getElementById('resume-input').value = lastResume;
  document.getElementById('jd-input').value = lastJD;
  document.getElementById('role-sel').value = lastRole;
  const isCustom = lastRole === 'custom';
  const jdEl = document.getElementById('jd-input');
  jdEl.readOnly = !isCustom;
  jdEl.style.opacity = isCustom ? '1' : '0.6';
  wordHint('resume-input', 'rv-hint', 80, 1200);
  wordHint('jd-input', 'jd-hint', 30, 500);
  clearErr();
  showPage('page-input');
  setTimeout(() => document.getElementById('resume-input').focus(), 100);
}

function resetAll() {
  document.getElementById('resume-input').value = '';
  document.getElementById('rv-hint').innerHTML = '';
  document.getElementById('role-sel').value = 'pm';
  clearErr();
  onRoleChange();
  showPage('page-input');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
